<!DOCTYPE html>
<html lang="en" style="--background: #F8F5F3; --foreground: #171717; --accent: #7e7a7a; --accent-invert: #FFCFAF">
<head>
    <link rel="icon" type="image/x-icon" href="/assets/moon-icon.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>madhura vaidya</title>

    <!-- Fonts + Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --cursor-size: 12px;
        }

        body {
            cursor: none;
            font-family: 'Crimson Pro', serif;
            background-color: var(--background);
            color: var(--foreground);
        }

        /* custom cursor */
        .custom-cursor {
            width: var(--cursor-size);
            height: var(--cursor-size);
            background: rgba(23, 23, 23, 0.2);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transition: transform 0.15s, opacity 0.15s;
            z-index: 9999;
            opacity: 0.8;
        }

        /* general styles */
        .unified-border {
            border: 1px solid var(--foreground);
            transition: all 0.2s ease;
        }

        .picture-container img {
            width: 280px;
            height: 350px;
            object-fit: cover;
        }

        footer {
            border-top: 1px solid var(--foreground);
            padding: 2rem 1rem;
            margin-top: 3rem;
            text-align: center;
        }

        .heart-icon {
            stroke: #DC2626;
            fill: none;
            margin-bottom: -4px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center">
    <div class="custom-cursor"></div>

    <!-- HOME BUTTON -->
    <a href="/index.html" class="absolute top-6 left-6 w-10 h-10 flex items-center justify-center unified-border rounded-full hover:bg-accent/10 transition-all">

        </svg>

                </p>

                <div class="mt-6 flex space-x-6">
                    <a href="https://www.linkedin.com/in/maddie-vaidya" target="_blank">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" stroke="currentColor" fill="none" stroke-width="1.5">
                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                            <line x1="8" y1="11" x2="8" y2="16"/>

                            <line x1="12" y1="16" x2="12" y2="11"/>
                            <path d="M16 16v-3a2 2 0 0 0 -4 0"/>
                        </svg>
                    </a>
                    <a href="mailto:27vaidyam@gmail.com">

                            <rect x="3" y="5" width="18" height="14" rx="2"/>

                <table class="mt-4 text-lg">

                        <td>ontario 🍁</td>
                    </tr>
                    <tr>
                        <td class="pr-3 font-semibold">studying:</td>
                        <td>neuroscience 🧠</td>
                    </tr>
                    <tr>
                        <td class="pr-3 font-semibold">currently:</td>
                        <td>building small projects ✨</td>
                    </tr>

        </div>
    </div>

    <footer>
        made with

</body>
